<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>NCDC — تطبيق المدير للهاتف v5</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="NCDC Manager" />
  <link rel="manifest" href="manifest.json?v=5" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Tajawal,Arial,sans-serif}
    :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:rgba(148,163,184,.20);--txt:#f8fafc;--mut:#94a3b8;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444}
    body{background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:78px}.hide{display:none!important}
    .wrap{max-width:720px;margin:0 auto;padding:14px}.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
    .login{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:26px 20px;box-shadow:0 16px 50px rgba(0,0,0,.25)}
    .logo{width:62px;height:62px;border-radius:20px;background:rgba(59,130,246,.14);color:#93c5fd;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px}.title{text-align:center;font-size:21px;font-weight:800}.sub{text-align:center;color:var(--mut);font-size:13px;margin-top:5px;line-height:1.6}.inp{width:100%;margin-top:18px;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:var(--txt);padding:14px;font-size:16px;outline:none;text-align:center}.btn{width:100%;margin-top:12px;border:0;border-radius:14px;background:var(--blue);color:white;padding:13px;font-size:16px;font-weight:800;cursor:pointer}.err{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.28);color:#fca5a5;border-radius:13px;padding:10px;margin-top:12px;text-align:center;font-size:13px}.note{font-size:12px;color:var(--mut);line-height:1.7;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.18);border-radius:18px;padding:12px;margin-top:12px}
    .top{position:sticky;top:0;background:rgba(15,23,42,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:10}.topin{max-width:720px;margin:0 auto;padding:13px 14px;display:flex;align-items:center;gap:10px}.appicon{width:42px;height:42px;border-radius:15px;background:rgba(59,130,246,.15);display:flex;align-items:center;justify-content:center;font-size:21px}.head{flex:1}.head h1{font-size:17px}.head p{font-size:11px;color:var(--mut);margin-top:2px}.iconbtn{border:1px solid var(--line);background:var(--card);color:var(--txt);width:42px;height:42px;border-radius:14px;font-size:18px;cursor:pointer}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.stat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px}.stat .n{font-size:28px;font-weight:800}.stat .l{color:var(--mut);font-size:12px;margin-top:2px}.stat.red{border-color:rgba(239,68,68,.24)}.stat.amber{border-color:rgba(245,158,11,.24)}.stat.green{border-color:rgba(34,197,94,.24)}
    .search{display:flex;gap:8px;margin:14px 0 10px}.search input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;color:var(--txt);padding:12px 13px;outline:none}.search button{width:48px;border:1px solid var(--line);border-radius:16px;background:var(--card);color:var(--txt);font-size:18px}.tabs{display:flex;gap:8px;overflow:auto;margin:10px 0 14px;padding-bottom:4px}.tab{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--mut);padding:8px 13px;border-radius:999px;font-size:13px;cursor:pointer}.tab.on{background:rgba(59,130,246,.18);color:#93c5fd;border-color:rgba(59,130,246,.35)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;margin-bottom:12px;overflow:hidden}.cardbody{padding:14px}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.subject{font-size:15px;font-weight:800;line-height:1.55;margin:8px 0;color:#fff}.meta{font-size:12px;color:var(--mut);line-height:1.8}.badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800}.new{background:rgba(239,68,68,.15);color:#fca5a5}.pending{background:rgba(245,158,11,.15);color:#fcd34d}.done{background:rgba(34,197,94,.15);color:#86efac}.arch{background:rgba(148,163,184,.15);color:#cbd5e1}.type{background:rgba(59,130,246,.15);color:#93c5fd}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:rgba(15,23,42,.35);border-top:1px solid var(--line);padding:10px}.smallbtn{border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--txt);padding:10px;font-weight:700;text-align:center;text-decoration:none;font-size:13px;cursor:pointer}.viewbtn{grid-column:1/-1;background:#2563eb;color:white;border-color:#2563eb;font-size:15px}.empty{text-align:center;color:var(--mut);padding:55px 10px;background:var(--card);border:1px solid var(--line);border-radius:22px}.loading{text-align:center;color:var(--mut);padding:25px}
    .bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);z-index:20}.nav{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px}.nav button{background:transparent;border:0;color:var(--mut);padding:8px 4px;border-radius:14px;font-size:12px}.nav button.on{background:rgba(59,130,246,.14);color:#93c5fd}.nav b{display:block;font-size:19px;margin-bottom:2px}
    .modal{position:fixed;inset:0;background:rgba(2,6,23,.72);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:18px;overflow:auto}.modal.show{display:flex}.modalbox{width:100%;max-width:650px;background:rgba(30,41,59,.98);border:1px solid var(--line);border-radius:26px;box-shadow:0 20px 60px rgba(0,0,0,.45);overflow:hidden}.modalhead{display:flex;align-items:center;gap:8px;justify-content:space-between;padding:14px;border-bottom:1px solid var(--line)}.modalhead h2{font-size:17px}.close{border:0;background:rgba(148,163,184,.18);color:white;width:38px;height:38px;border-radius:14px;font-size:20px;cursor:pointer}.detail{padding:14px}.drow{display:grid;grid-template-columns:100px 1fr;gap:10px;border-bottom:1px solid var(--line);padding:10px 0;font-size:14px}.drow b{color:#cbd5e1}.drow span{color:#fff;word-break:break-word}.statusBox{margin-top:14px;background:rgba(15,23,42,.65);border:1px solid rgba(59,130,246,.28);border-radius:18px;padding:12px}.statusBox label{display:block;font-weight:800;color:#93c5fd;margin-bottom:8px}.select{width:100%;background:#0f172a;border:1px solid var(--line);border-radius:14px;color:white;padding:12px;font-size:16px;outline:none}.modalactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#052e16;color:#bbf7d0;border:1px solid rgba(34,197,94,.35);border-radius:14px;padding:11px 16px;font-weight:800;z-index:200;box-shadow:0 10px 40px rgba(0,0,0,.32);min-width:220px;text-align:center}.preview{margin-top:14px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#0f172a}.preview img{width:100%;display:block;max-height:70vh;object-fit:contain;background:#0b1220}.fileBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.toast.bad{background:#450a0a;color:#fecaca;border-color:rgba(239,68,68,.35)}
  </style>
</head>
<body>
  <div id="loginScreen" class="center">
    <div class="login">
      <div class="logo">🛡️</div><div class="title">لوحة المدير للهاتف</div>
      <div class="sub">عرض المراسلات مع تعديل الحالة من داخل صفحة عرض المراسلة</div>
      <input id="pass" class="inp" type="password" placeholder="كلمة مرور المدير" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn" onclick="login()">دخول المدير</button>
      <div id="loginErr" class="err hide">كلمة المرور غير صحيحة</div>
    </div>
  </div>
  <div id="app" class="hide">
    <div class="top"><div class="topin"><div class="appicon">📬</div><div class="head"><h1>لوحة المدير</h1><p id="conn">جاري الاتصال بـ Firebase...</p></div><button class="iconbtn" onclick="logout()">↩</button></div></div>
    <main class="wrap">
      <div class="stats"><div class="stat"><div class="n" id="stActive">0</div><div class="l">وارد نشط</div></div><div class="stat red"><div class="n" id="stNew">0</div><div class="l">جديد</div></div><div class="stat amber"><div class="n" id="stPending">0</div><div class="l">قيد المعالجة</div></div><div class="stat green"><div class="n" id="stDone">0</div><div class="l">منجز</div></div></div>
      <div class="search"><input id="q" placeholder="بحث بالموضوع أو الجهة أو الرقم..." oninput="query=this.value;render()"><button onclick="refresh()">↻</button></div>
      <div class="tabs"><button class="tab on" id="tab-all" onclick="setFilter('all')">الكل</button><button class="tab" id="tab-new" onclick="setFilter('new')">جديد</button><button class="tab" id="tab-pending" onclick="setFilter('pending')">قيد المعالجة</button><button class="tab" id="tab-done" onclick="setFilter('done')">منجز</button><button class="tab" id="tab-archive" onclick="setFilter('archive')">الأرشيف</button></div>
      <div id="list" class="loading">جاري تحميل البيانات...</div>
    </main>
    <div class="bottom"><div class="nav"><button id="bn-all" class="on" onclick="setFilter('all')"><b>⌂</b>الرئيسية</button><button id="bn-new" onclick="setFilter('new')"><b>●</b>الجديد</button><button id="bn-pending" onclick="setFilter('pending')"><b>⏳</b>قيد</button><button id="bn-archive" onclick="setFilter('archive')"><b>🗄️</b>الأرشيف</button></div></div>
  </div>

  <div id="detailsModal" class="modal" onclick="if(event.target.id==='detailsModal')closeDetails()">
    <div class="modalbox">
      <div class="modalhead"><button class="close" onclick="closeDetails()">×</button><h2>عرض المراسلة وتعديل الحالة</h2></div>
      <div id="modalContent" class="detail"></div>
    </div>
  </div>

<script>
const MANAGER_PASSWORD = "1821992";
const COLLECTION_NAME = "mails";
const firebaseConfig = {
  apiKey:"AIzaSyB-zqUZQ5u9AUKislLLl-KAGLoN9nairEo",
  authDomain:"ncdc-mail-a68ff.firebaseapp.com",
  projectId:"ncdc-mail-a68ff",
  storageBucket:"ncdc-mail-a68ff.firebasestorage.app",
  messagingSenderId:"197299236308",
  appId:"1:197299236308:web:4205dd506cbc0148a53a41"
};
let db, unsub, mails = [], filter = 'all', query = '';
try{ firebase.initializeApp(firebaseConfig); db = firebase.firestore(); }catch(e){ console.error(e); }
function login(){const p=document.getElementById('pass').value.trim(); if(p!==MANAGER_PASSWORD){document.getElementById('loginErr').classList.remove('hide');return;} document.getElementById('loginScreen').classList.add('hide');document.getElementById('app').classList.remove('hide');listen();}
function logout(){ if(unsub)unsub(); document.getElementById('app').classList.add('hide'); document.getElementById('loginScreen').classList.remove('hide'); }
function listen(){ if(!db){document.getElementById('conn').textContent='Firebase غير متصل';return;} document.getElementById('conn').textContent='متصل — تتم المزامنة مباشرة'; unsub = db.collection(COLLECTION_NAME).orderBy('createdAt','desc').onSnapshot(snap=>{mails = snap.docs.map(d=>({id:d.id,...d.data()})); render();},err=>{console.error(err);document.getElementById('conn').textContent='تعذر الاتصال بقاعدة البيانات';toast('تعذر الاتصال بـ Firebase',true);}); }
function refresh(){ if(unsub)unsub(); listen(); toast('تم التحديث'); }
function setFilter(f){filter=f;document.querySelectorAll('.tab,.nav button').forEach(x=>x.classList.remove('on'));document.getElementById('tab-'+f)?.classList.add('on');document.getElementById('bn-'+f)?.classList.add('on');render();}
function getStatus(m){ if(m.archived) return 'archive'; return m.status || 'new'; }
function badge(status){ if(status==='new')return '<span class="badge new">جديد</span>'; if(status==='pending')return '<span class="badge pending">قيد المعالجة</span>'; if(status==='done')return '<span class="badge done">منجز</span>'; return '<span class="badge arch">الأرشيف</span>'; }
function arType(t){ return t==='out'?'صادر':'وارد'; }
function render(){
  const active=mails.filter(m=>m.type==='in'&&!m.archived).length; const nw=mails.filter(m=>!m.archived&&getStatus(m)==='new').length; const pe=mails.filter(m=>!m.archived&&getStatus(m)==='pending').length; const dn=mails.filter(m=>!m.archived&&getStatus(m)==='done').length;
  document.getElementById('stActive').textContent=active;document.getElementById('stNew').textContent=nw;document.getElementById('stPending').textContent=pe;document.getElementById('stDone').textContent=dn;
  let arr=[...mails]; if(filter==='archive')arr=arr.filter(m=>m.archived); else if(filter!=='all')arr=arr.filter(m=>!m.archived&&getStatus(m)===filter); else arr=arr.filter(m=>!m.archived);
  const q=(query||'').trim().toLowerCase(); if(q)arr=arr.filter(m=>[m.subject,m.party,m.ref,m.notes,m.date,m.from].join(' ').toLowerCase().includes(q));
  const list=document.getElementById('list'); if(!arr.length){list.className='empty';list.innerHTML='لا توجد مراسلات مطابقة';return;} list.className='';
  list.innerHTML=arr.map(m=>{ const st=getStatus(m); return `<section class="card"><div class="cardbody"><div class="row"><span class="badge type">${arType(m.type)}</span>${badge(st)}</div><div class="subject">${esc(m.subject||'بدون موضوع')}</div><div class="meta">الرقم: ${esc(m.ref||'غير محدد')}<br>الجهة: ${esc(m.party||m.from||'غير محدد')}<br>التاريخ: ${esc(m.date||'غير محدد')}</div></div><div class="actions"><button class="smallbtn viewbtn" onclick="openDetails('${m.id}')">عرض المراسلة / تعديل الحالة</button></div></section>`; }).join('');
}
function normalizeFileValue(v){
  if(!v) return '';
  if(Array.isArray(v)) return normalizeFileValue(v[0]);
  if(typeof v === 'object') return normalizeFileValue(v.url || v.downloadURL || v.fileUrl || v.src || v.data || v.base64 || v.content || '');
  let x = String(v).trim();
  if(!x) return '';
  if(x.startsWith('http') || x.startsWith('data:') || x.startsWith('blob:')) return x;
  if(x.length > 120 && /^[A-Za-z0-9+/=

]+$/.test(x)) return 'data:image/jpeg;base64,' + x.replace(/\s/g,'');
  return x;
}
function getImageUrl(m){
  const keys=['imageUrl','img','image','photoUrl','photo','scanUrl','scanImage','fileImage','imageData','imageBase64','uploadedImage','attachmentImage','previewUrl'];
  for(const k of keys){ const u=normalizeFileValue(m[k]); if(u) return u; }
  const any=normalizeFileValue(m.attachmentUrl||m.fileUrl||m.url||m.att);
  if(any && !/\.pdf(\?|#|$)/i.test(any)) return any;
  return '';
}
function getPdfUrl(m){
  const keys=['pdfUrl','pdf','fileUrl','attachmentUrl','att','attachment','documentUrl','scanPdf','uploadedPdf','url'];
  for(const k of keys){ const u=normalizeFileValue(m[k]); if(u) return u; }
  return '';
}
function openFile(url){
  if(!url){ toast('لا يوجد ملف مرفق',true); return; }
  const w=window.open(url,'_blank');
  if(!w) toast('المتصفح منع فتح الملف. اضغط مطولاً على الزر واختر فتح في تبويب جديد',true);
}
function openDetails(id){ const m=mails.find(x=>x.id===id); if(!m)return; const st=getStatus(m); const att=getPdfUrl(m); const img=getImageUrl(m); document.getElementById('modalContent').innerHTML=`
  <div class="drow"><b>الموضوع</b><span>${esc(m.subject||'بدون موضوع')}</span></div>
  <div class="drow"><b>الرقم</b><span>${esc(m.ref||'غير محدد')}</span></div>
  <div class="drow"><b>التاريخ</b><span>${esc(m.date||'غير محدد')}</span></div>
  <div class="drow"><b>من</b><span>${esc(m.party||m.from||'غير محدد')}</span></div>
  <div class="drow"><b>الحالة</b><span id="currentStatusBadge">${badge(st)}</span></div>
  <div class="drow"><b>الأولوية</b><span>${esc(m.priority||m.importance||'عادي')}</span></div>
  ${m.notes?`<div class="drow"><b>ملاحظات</b><span>${esc(m.notes)}</span></div>`:''}
  <div class="statusBox"><label>تعديل الحالة</label><select id="modalStatusSelect" class="select" onchange="changeStatus('${m.id}',this.value,true)"><option value="new" ${st==='new'?'selected':''}>جديد</option><option value="pending" ${st==='pending'?'selected':''}>قيد المعالجة</option><option value="done" ${st==='done'?'selected':''}>منجز</option><option value="archive" ${st==='archive'?'selected':''}>الأرشيف</option></select></div>
  ${img?`<div class="preview"><img src="${esc(img)}" onerror="this.parentElement.innerHTML='تعذر عرض الصورة. استخدم زر فتح الملف.'"></div>`:''}
  <div class="fileBtns"><button class="smallbtn" onclick="openFile('${esc(att||img)}')">فتح الملف / الصورة</button><button class="smallbtn" onclick="location.reload()">تحديث</button></div>`;
  document.getElementById('detailsModal').classList.add('show'); }
function closeDetails(){ document.getElementById('detailsModal').classList.remove('show'); }
async function changeStatus(id, val, keepModal=false){ const m=mails.find(x=>x.id===id); if(!m)return; const archived = val==='archive'; const status = archived ? 'done' : val; try{ await db.collection(COLLECTION_NAME).doc(id).set({status, archived, statusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); toast('تم تعديل الحالة بنجاح'); if(keepModal){ const fake={...m,status,archived}; document.getElementById('currentStatusBadge').innerHTML=badge(getStatus(fake)); } }catch(e){ console.error(e); toast('حدث خطأ أثناء تعديل الحالة',true); render(); } }
function toast(msg,bad=false){const t=document.createElement('div');t.className='toast'+(bad?' bad':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js?v=5').catch(()=>{});}
</script>
</body>
</html>
